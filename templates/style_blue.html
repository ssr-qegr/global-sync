<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科技晨报 - 商务极简蓝</title>
<style>
  :root { --primary: #0052D9; --bg: #F3F5F8; --card-bg: #FFFFFF; --text-main: #1C1F23; --text-sub: #5C6A82; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
  .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
  .header h1 { color: var(--primary); margin: 0; font-size: 28px; font-weight: 600; }
  .date { color: var(--text-sub); font-size: 14px; }
  .news-item { border-left: 3px solid var(--primary); padding: 16px 20px; margin-bottom: 20px; background: #F8FAFC; border-radius: 0 8px 8px 0; transition: all 0.3s ease; }
  .news-item:hover { transform: translateX(4px); box-shadow: 0 2px 10px rgba(0,82,217,0.1); }
  .news-item h2 { margin: 0 0 10px 0; font-size: 18px; color: var(--text-main); }
  .news-item p { margin: 0 0 12px 0; font-size: 15px; color: var(--text-sub); line-height: 1.6; }
  .tag { display: inline-block; background: #E0EBF5; color: var(--primary); padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 12px; font-weight: 500; }
  .link { color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 500; }
  .link:hover { text-decoration: underline; }
  .footer { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; color: var(--text-sub); font-size: 12px; }
  @media (max-width: 600px) { .container { padding: 20px; } .header { flex-direction: column; align-items: flex-start; gap: 8px; } }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📰 科技晨报</h1>
      <div class="date">2026年6月11日</div>
    </div>
    <div class="news-item">
      <span class="tag">AI 突破</span>
      <h2>GPT-Next 模型正式发布，逻辑推理能力提升40%</h2>
      <p>今日凌晨，OpenAI正式发布新一代模型，在复杂逻辑推理和数学证明方面实现重大突破。该模型引入了全新的思维链自检机制。</p>
      <a href="#" class="link">阅读原文 ↗</a>
    </div>
    <div class="news-item">
      <span class="tag">行业动态</span>
      <h2>苹果公布全新 Apple Intelligence 落地计划</h2>
      <p>苹果在昨天的发布会上详细展示了AI在全家桶生态中的深度集成，Siri迎来史诗级强化，支持跨App复杂操作。</p>
      <a href="#" class="link">阅读原文 ↗</a>
    </div>
    <div class="footer">
      Generated by Mira · 商务极简蓝排版
    </div>
  </div>
</body>
</html>
