<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨间简报 - 暖色温暖风</title>
<style>
  :root { --primary: #E8892E; --accent: #F4B860; --bg: #FFF7E8; --card-bg: #FFFCF5; --text-main: #4A3426; --text-sub: #8A6A55; --line: #F3D6A8; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans GB", "PingFang SC", "Yu Gothic", "Microsoft YaHei", sans-serif; background: radial-gradient(circle at top left, #FFE8B8 0, transparent 32%), linear-gradient(180deg, #FFF7E8 0%, #FBEEDB 100%); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.7; }
  .container { max-width: 700px; margin: 0 auto; background: rgba(255,252,245,0.96); padding: 40px; border-radius: 28px; border: 1px solid rgba(243,214,168,0.75); box-shadow: 0 18px 45px rgba(187,111,42,0.13); }
  .header { padding: 24px 24px 22px; margin-bottom: 28px; border-radius: 22px; background: linear-gradient(135deg, #FFF2D8 0%, #FFE2AF 100%); border: 1px solid var(--line); position: relative; overflow: hidden; }
  .header::after { content: ""; position: absolute; right: -28px; top: -28px; width: 110px; height: 110px; background: rgba(255,255,255,0.45); border-radius: 50%; }
  .header h1 { color: var(--primary); margin: 0 0 8px 0; font-size: 30px; font-weight: 800; letter-spacing: 0.04em; position: relative; z-index: 1; }
  .date { color: var(--text-sub); font-size: 14px; font-weight: 600; position: relative; z-index: 1; }
  .news-item { background: #FFFFFF; padding: 24px; margin-bottom: 22px; border-radius: 20px; border: 1px solid #F5DEBA; box-shadow: 0 8px 22px rgba(188,116,48,0.08); transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; position: relative; }
  .news-item::before { content: ""; position: absolute; left: 20px; top: 0; width: 42px; height: 4px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 0 0 999px 999px; }
  .news-item:hover { transform: translateY(-3px); border-color: #F1C47D; box-shadow: 0 12px 30px rgba(188,116,48,0.14); }
  .news-item h2 { margin: 0 0 10px 0; font-size: 20px; line-height: 1.45; color: #3D281C; font-weight: 750; }
  .news-item p { margin: 0 0 16px 0; font-size: 15px; color: var(--text-sub); }
  .tag { display: inline-block; background: #FFF0D6; color: #B95F16; padding: 5px 13px; border-radius: 999px; font-size: 12px; font-weight: 700; margin-bottom: 14px; border: 1px solid #F5D8A7; }
  .link { display: inline-flex; align-items: center; gap: 4px; color: #C76A1B; text-decoration: none; font-size: 14px; font-weight: 700; }
  .link:hover { color: var(--primary); text-decoration: underline; text-underline-offset: 4px; }
  .footer { text-align: center; margin-top: 34px; padding-top: 20px; border-top: 1px dashed var(--line); color: #A9876A; font-size: 13px; }
  @media (max-width: 600px) { body { padding: 12px; } .container { padding: 22px; border-radius: 22px; } .header { padding: 20px; } .header h1 { font-size: 26px; } .news-item { padding: 22px 18px; } .news-item h2 { font-size: 18px; } }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>☀️ 晨间简报</h1>
      <div class="date">2026年6月11日 · 木曜日 · 暖阳已送达</div>
    </div>
    <div class="news-item">
      <span class="tag">🍊 今日灵感</span>
      <h2>小团队用 AI 自动整理晨会摘要，沟通效率提升明显</h2>
      <p>一支产品团队分享了他们的轻量化工作流：会议结束后自动提取行动项、风险点和负责人，让每天的开始更从容。</p>
      <a href="#" class="link">慢慢阅读 ↗</a>
    </div>
    <div class="news-item">
      <span class="tag">🍵 技术观察</span>
      <h2>开源社区推出新的前端可访问性检查清单</h2>
      <p>这份清单覆盖颜色对比度、键盘导航、移动端阅读体验等关键场景，适合在日常页面发布前快速自检。</p>
      <a href="#" class="link">慢慢阅读 ↗</a>
    </div>
    <div class="footer">
      Generated by Mira · 暖色温暖风排版 · 今日也请温柔前行
    </div>
  </div>
</body>
</html>
